<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Document Assistant</title>
    <style>
        :root {
            --primary: #0f766e;
            --primary-dark: #115e59;
            --bg: #f3f7f8;
            --card: #ffffff;
            --text: #152129;
            --muted: #576873;
            --border: #d9e3e8;
            --ai-bg: #edf4f5;
            --user-bg: #0f766e;
            --warning-bg: #fff8e8;
            --warning-border: #f5d98f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top right, #d8ecea 0%, var(--bg) 45%, #eef4f8 100%);
            color: var(--text);
            font-family: "IBM Plex Sans", "Segoe UI", Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }

        .title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary-dark);
        }

        .subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 88%;
            display: flex;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            border-radius: 14px;
            padding: 12px 14px;
            line-height: 1.45;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            background: var(--card);
        }

        .message.user .bubble {
            background: var(--user-bg);
            border-color: var(--user-bg);
            color: #fff;
        }

        .message.ai .bubble {
            background: var(--ai-bg);
            color: var(--text);
        }

        .input-panel {
            border-top: 1px solid var(--border);
            background: var(--card);
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .filters {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
        }

        .filters input,
        .filters select,
        .message-input {
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .message-input {
            flex: 1;
        }

        .send-btn {
            border: none;
            background: var(--primary);
            color: #fff;
            padding: 0 14px;
            border-radius: 9px;
            cursor: pointer;
            font-weight: 600;
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .examples {
            margin-top: 8px;
            padding-left: 18px;
        }

        .examples li {
            cursor: pointer;
            margin-bottom: 5px;
            color: #0f4d66;
        }

        .sources {
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            padding: 8px;
        }

        .source-item {
            padding: 8px;
            border: 1px solid #e9eef1;
            border-radius: 7px;
            margin-bottom: 7px;
            color: inherit;
            text-decoration: none;
            display: block;
        }

        .source-item:last-child {
            margin-bottom: 0;
        }

        .source-meta {
            margin-top: 4px;
            color: #5d6d77;
            font-size: 0.82rem;
        }

        .source-snippet {
            margin-top: 6px;
            font-size: 0.84rem;
            color: #29404d;
        }

        .typing {
            display: inline-flex;
            gap: 5px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #7b8f99;
            animation: blink 1.1s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.30s; }

        @keyframes blink {
            0%, 100% { opacity: 0.25; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-2px); }
        }

        @media (max-width: 900px) {
            .filters {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 640px) {
            .filters {
                grid-template-columns: 1fr;
            }
            .message {
                max-width: 96%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Financial Document Assistant</div>
        <div class="subtitle">Lokale Q&A over financiële, accounting- en technische documenten.</div>
        <div class="subtitle" style="margin-top:6px;color:#49606c;">
            Deze assistent zoekt lokaal in de beschikbare documenten. Gebruik de uitkomsten als voorbereiding en controleer belangrijke conclusies altijd zelf.
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message ai">
            <div class="bubble">
                Stel een vraag over je lokaal geïndexeerde documenten.
            </div>
        </div>
    </div>

    <div class="input-panel">
        <div class="filters">
            <select id="documentType">
                <option value="">Documenttype (optioneel)</option>
                <option value="tax_law">Tax law</option>
                <option value="regulation">Regulation</option>
                <option value="annual_report">Annual report</option>
                <option value="invoice">Invoice</option>
                <option value="ledger">Ledger</option>
                <option value="bank_statement">Bank statement</option>
                <option value="tax_return">Tax return</option>
                <option value="correspondence">Correspondence</option>
                <option value="other">Other</option>
            </select>
            <input id="jurisdiction" type="text" placeholder="Rechtsgebied (bijv. Netherlands)">
            <input id="taxYear" type="number" min="1900" max="2100" placeholder="Boekjaar (bijv. 2025)">
        </div>
        <div class="input-row">
            <input id="messageInput" class="message-input" type="text" placeholder="Stel een vraag over je documenten..." autocomplete="off">
            <button id="sendBtn" class="send-btn">Verstuur</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + "/api/v1/llama/ask";
        const chatContainer = document.getElementById("chatContainer");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");

        const LAZY_PDF_HIGHLIGHT = true;
        const documentTypeInput = document.getElementById("documentType");
        const jurisdictionInput = document.getElementById("jurisdiction");
        const taxYearInput = document.getElementById("taxYear");

        let conversationHistory = [];
        let isProcessing = false;

        function setMessage(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function isChromeFamilyBrowser() {
            const ua = navigator.userAgent || "";
            return ua.includes("Chrome") || ua.includes("Edg");
        }

        function normalizeForPdfSearch(text) {
            return String(text || "")
                .replace(/\s+/g, " ")
                .replace(/[^\w\s\u20AC\u00A3$%.,\-]/g, " ")
                .trim();
        }

        function buildPdfFragment(source) {
            const page = source.page ? `page=${source.page}` : "";
            const snippetText = normalizeForPdfSearch(source.snippet || "");

            const words = snippetText.split(" ").filter(Boolean);
            const shortPhrase = words.slice(0, 6).join(" ");
            const keyword = words.find((w) => w.length >= 5) || words[0] || "";

            const fragmentParts = [];
            if (page) fragmentParts.push(page);

            if (isChromeFamilyBrowser()) {
                if (keyword) fragmentParts.push(`search=${encodeURIComponent(keyword)}`);
                if (shortPhrase && shortPhrase !== keyword) {
                    fragmentParts.push(`search_phrase=${encodeURIComponent(shortPhrase)}`);
                }
            } else if (shortPhrase) {
                fragmentParts.push(`search=${encodeURIComponent(shortPhrase)}`);
            } else if (keyword) {
                fragmentParts.push(`search=${encodeURIComponent(keyword)}`);
            }

            return fragmentParts.length ? `#${fragmentParts.join("&")}` : "";
        }

        function extractNumericCandidates(text) {
            const matches = String(text || "").match(/\$?\d[\d,]*(?:\.\d+)?%?/g) || [];
            const unique = [];
            const seen = new Set();
            for (const m of matches) {
                const cleaned = m.trim();
                if (!cleaned) continue;
                const key = cleaned.replace(/\s+/g, "");
                if (seen.has(key)) continue;
                seen.add(key);
                unique.push(cleaned);
            }
            return unique.slice(0, 8);
        }

        function scoreNumericCandidate(token) {
            const t = String(token || "").trim();
            if (!t) return -999;
            let score = 0;
            if (t.includes("$") || t.includes("\u20AC") || t.includes("\u00A3")) score += 6;
            if (t.includes(",")) score += 4;
            if (t.includes(".")) score += 2;
            if (/%$/.test(t)) score -= 3;
            const digitsOnly = t.replace(/[^\d]/g, "");
            if (digitsOnly.length >= 6) score += 5;
            else if (digitsOnly.length >= 4) score += 3;
            else if (digitsOnly.length <= 2) score -= 2;
            if (/^(19|20)\d{2}$/.test(digitsOnly)) score -= 5;
            return score;
        }

        function chooseAnswerLinkedNumericCandidates(sourceSnippet, answerText) {
            const answerCandidates = extractNumericCandidates(answerText || "");
            const snippetCandidates = extractNumericCandidates(sourceSnippet || "");

            const rank = (arr) =>
                arr
                    .map((v) => ({ value: v, score: scoreNumericCandidate(v) }))
                    .filter((x) => x.score >= 1)
                    .sort((a, b) => b.score - a.score)
                    .map((x) => x.value);
            const rankedAnswer = rank(answerCandidates);
            if (rankedAnswer.length) return rankedAnswer.slice(0, 4);
            const rankedSnippet = rank(snippetCandidates);
            return rankedSnippet.slice(0, 4);
        }

        function buildPdfHighlightUrl(rawPdfUrl, source, answerText) {
            const snippetText = normalizeForPdfSearch(source.snippet || "");
            const words = snippetText.split(" ").filter(Boolean);
            const query = words.slice(0, 10).join(" ");
            const numericTargets = chooseAnswerLinkedNumericCandidates(source.snippet || "", answerText || "");
            const params = new URLSearchParams({
                file: rawPdfUrl,
                page: String(source.page || 1),
                q: query
            });
            if (numericTargets.length) {
                params.set("n", numericTargets.join("|"));
            }
            return `/static/pdf_highlight.html?${params.toString()}`;
        }

        function getFilenameExtension(filename) {
            const name = String(filename || "").toLowerCase();
            const lastDot = name.lastIndexOf(".");
            return lastDot >= 0 ? name.slice(lastDot) : "";
        }

        function isPdfFilename(filename) {
            return getFilenameExtension(filename) === ".pdf";
        }

        function isBatchIndexedSourceDocumentId(docId) {
            const id = String(docId || "");
            return id.includes("-file-") || id.startsWith("pdf-") || id.includes("-pdf-");
        }

        function openSourcePdf(event, anchor) {
            if (!LAZY_PDF_HIGHLIGHT) return true;
            const fileKind = anchor.getAttribute("data-file-kind");
            if (fileKind !== "pdf") return true;
            const rawPdfUrl = anchor.getAttribute("data-raw-pdf-url");
            if (!rawPdfUrl || rawPdfUrl === "#") return true;
            const source = {
                snippet: anchor.getAttribute("data-snippet") || "",
                page: Number(anchor.getAttribute("data-page") || "1")
            };
            const answerText = anchor.getAttribute("data-answer-text") || "";
            const lazyUrl = buildPdfHighlightUrl(rawPdfUrl, source, answerText);
            anchor.setAttribute("href", lazyUrl);
            return true;
        }

        function renderSourceCards(sources, answerText) {
            const dutchSignals = [
                "btw", "omzetbelasting", "jaarrekening", "balans", "winst-en-verliesrekening",
                "klantnotities", "polis", "verzekering", "belastingdienst", "mkb", "nederland"
            ];
            const statementSignals = ["winst-en-verliesrekening", "resultatenrekening", "profit and loss", "p&l", "balans", "balance sheet"];
            const typeLabels = {
                profit_loss: "profit_loss",
                balance_sheet: "balance_sheet",
                vat_overview: "vat_overview",
                client_notes: "client_notes",
                contract: "contract",
                insurance_document: "insurance_document",
                annual_accounts_checklist: "annual_accounts_checklist",
                accounting_guidance: "accounting_guidance",
                vat_guidance: "vat_guidance",
                insurance_guidance: "insurance_guidance",
            };

            function hasDutchContext(text) {
                const t = (text || "").toLowerCase();
                return dutchSignals.some((s) => t.includes(s));
            }

            function resolveType(source, contextText) {
                const detail = (source.document_type_detail || "").toLowerCase();
                if (detail && detail !== "other") return typeLabels[detail] || detail;
                const category = (source.category || "").toLowerCase();
                if (category === "other" || !category) return "";
                if (category === "invoice" && hasDutchContext(contextText) && statementSignals.some((s) => contextText.toLowerCase().includes(s))) {
                    return "";
                }
                return category;
            }

            function resolveJurisdiction(source, contextText) {
                const jurisdiction = source.jurisdiction || "";
                if (!jurisdiction || jurisdiction.toLowerCase() === "unknown") return "";
                if (jurisdiction === "United States" && hasDutchContext(contextText)) return "";
                return jurisdiction;
            }

            return sources.map((s) => {
                const docId = String(s.document_id || "");
                const viewFilename = String(s.view_filename || s.filename || "");
                const isPdf = isPdfFilename(viewFilename);
                const isConvertedXafPreview = getFilenameExtension(s.filename) === ".xaf" && isPdf;
                const fragment = (isPdf && !isConvertedXafPreview) ? buildPdfFragment(s) : "";
                const isBatchSourceFile = isBatchIndexedSourceDocumentId(docId);
                const batchFolder = (s.corpus_type === "existing") ? "existing_files" : "source_files";
                const rawPdfUrl = isBatchSourceFile && viewFilename
                    ? `/${batchFolder}/${encodeURIComponent(viewFilename)}${fragment}`
                    : (s.document_id ? `/api/v1/documents/${s.document_id}/view${fragment}` : "#");
                const escapedSnippet = escapeHtml(repairTextArtifacts(s.snippet || ""));
                const escapedAnswerText = escapeHtml(answerText || "");
                const contextText = `${s.filename || ""} ${s.title || ""} ${repairTextArtifacts(s.snippet || "")}`;
                const resolvedType = resolveType(s, contextText);
                const resolvedJurisdiction = resolveJurisdiction(s, contextText);
                const locationLabel = (isPdf && !isConvertedXafPreview) ? "Pagina" : "Fragment";
                const metaParts = [
                    `Score: ${Number(s.score || 0).toFixed(2)}`,
                    `${locationLabel}: ${s.page || "N/A"}`
                ];
                if (resolvedType) metaParts.push(`Type: ${resolvedType}`);
                if (resolvedJurisdiction) metaParts.push(`Rechtsgebied: ${resolvedJurisdiction}`);
                if (s.tax_year && s.tax_year !== "unknown") metaParts.push(`Boekjaar: ${s.tax_year}`);

                return `
                    <a href="${rawPdfUrl}" target="_blank" class="source-item"
                        data-raw-pdf-url="${rawPdfUrl}"
                        data-file-kind="${(isPdf && !isConvertedXafPreview) ? "pdf" : "file"}"
                        data-snippet="${escapedSnippet}"
                        data-page="${s.page || 1}"
                        data-answer-text="${escapedAnswerText}"
                        onclick="return openSourcePdf(event, this)">
                        <div><strong>${escapeHtml(repairTextArtifacts(s.filename || "Document"))}</strong></div>
                        <div class="source-meta">
                            ${metaParts.join(" | ")}
                        </div>
                        ${s.snippet ? `<div class="source-snippet">${escapeHtml(repairTextArtifacts(s.snippet))}</div>` : ""}
                    </a>
                `;
            }).join("");
        }

        function stripTrailingSourceSection(answerText) {
            if (!answerText) return "";
            const sourceHeaderMatch = answerText.match(/\n(?:Bronnen|Sources):\s*$/i);
            if (sourceHeaderMatch) {
                return answerText.slice(0, sourceHeaderMatch.index).trimEnd();
            }
            const trailingBlockMatch = answerText.match(/\n(?:Bronnen|Sources):\s*\n(?:[-*].*\n?)+\s*$/i);
            if (trailingBlockMatch) {
                return answerText.slice(0, trailingBlockMatch.index).trimEnd();
            }
            return answerText;
        }

        function addMessage(role, text, sources = [], warnings = [], metaLine = "") {
            const node = document.createElement("div");
            node.className = `message ${role}`;

            const repairedText = repairTextArtifacts(text || "");
            const visibleText = (role === "ai" && sources && sources.length > 0)
                ? stripTrailingSourceSection(repairedText)
                : repairedText;
            let html = visibleText.replace(/\n/g, "<br>");
            if (role === "ai" && warnings && warnings.length > 0) {
                html += `<div class="source-meta" style="margin-top:8px;color:#8a6d3b">${warnings.map(escapeHtml).join("<br>")}</div>`;
            }
            if (role === "ai" && metaLine) {
                html += `<div class="source-meta" style="margin-top:8px">${escapeHtml(metaLine)}</div>`;
            }
            if (role === "ai" && sources && sources.length > 0) {
                html += `<div class="sources"><strong>Gebruikte bronnen</strong><div style="margin-top:8px">${renderSourceCards(sources, visibleText)}</div></div>`;
            }

            node.innerHTML = `<div class="bubble">${html}</div>`;
            chatContainer.appendChild(node);
            scrollToBottom();
            return node;
        }

        function addTyping() {
            const id = `typing-${Date.now()}`;
            const node = document.createElement("div");
            node.id = id;
            node.className = "message ai";
            node.innerHTML = `<div class="bubble"><span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>`;
            chatContainer.appendChild(node);
            scrollToBottom();
            return id;
        }

        function removeNode(id) {
            const node = document.getElementById(id);
            if (node) node.remove();
        }

        function escapeHtml(value) {
            return value
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function sendMessage() {
            const question = messageInput.value.trim();
            if (!question || isProcessing) return;

            addMessage("user", question);
            messageInput.value = "";
            isProcessing = true;
            sendBtn.disabled = true;

            const typingId = addTyping();

            const payload = {
                question,
                history: conversationHistory,
                document_type: documentTypeInput.value || null,
                jurisdiction: jurisdictionInput.value.trim() || null,
                tax_year: taxYearInput.value ? Number(taxYearInput.value) : null
            };
            const requestStarted = performance.now();

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                removeNode(typingId);

                if (!response.ok) {
                    throw new Error(data?.detail || "Request failed");
                }
                const requestSeconds = ((performance.now() - requestStarted) / 1000).toFixed(2);
                const responseTime = `Responstijd: ${requestSeconds}s`;

                addMessage(
                    "ai",
                    data.answer || "No answer returned.",
                    data.sources || [],
                    data.warnings || [],
                    responseTime
                );
                conversationHistory.push({ role: "user", content: question });
                conversationHistory.push({ role: "assistant", content: data.answer || "" });
            } catch (err) {
                removeNode(typingId);
                const detail = (err && err.message) ? `\n\nFoutdetail: ${String(err.message).slice(0, 180)}` : "";
                addMessage("ai", `Ik kon dit verzoek niet verwerken. Controleer of de backend draait en probeer het opnieuw.${detail}`);
                console.error(err);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function repairTextArtifacts(value) {
            return String(value || "")
                .replaceAll("â€™", "'")
                .replaceAll("â", "'")
                .replaceAll("â€˜", "'")
                .replaceAll("â", "'")
                .replaceAll("â€œ", "\"")
                .replaceAll("â", "\"")
                .replaceAll("â€", "\"")
                .replaceAll("â", "\"")
                .replaceAll("â€“", "-")
                .replaceAll("â", "-")
                .replaceAll("â€”", "-")
                .replaceAll("â", "-")
                .replaceAll("â€¦", "...")
                .replaceAll("â¦", "...")
                .replaceAll("â‚¬", "€")
                .replaceAll("Ã©", "é")
                .replaceAll("Ã¨", "è")
                .replaceAll("Ã«", "ë")
                .replaceAll("Ãª", "ê")
                .replaceAll("Ã¡", "á")
                .replaceAll("Ã ", "à")
                .replaceAll("Ã¶", "ö")
                .replaceAll("Ã¼", "ü")
                .replaceAll("Ã¯", "ï")
                .replaceAll("Ã§", "ç")
                .replaceAll("Ã²", "ò")
                .replaceAll("Ã´", "ô");
        }
    </script>
</body>
</html>
